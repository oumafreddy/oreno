# Optional nginx hardening for Oreno GRC (include inside the server { } block).
# Addresses KRCScan INF-001 (Server version disclosure).

server_tokens off;

# If using proxy_pass to gunicorn/uvicorn, security headers can also be set here
# as a backup — Django middleware is the primary source of truth.

add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
